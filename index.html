<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Virtuais</title>
    <style>
        body {
            background-color: #fcf4e6;
            margin: 0;
            display: flex;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        .left-panel {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }
        .right-panel {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            position: relative;
        }
        #text-container {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #333;
            min-height: 200px;
            margin-bottom: 40px;
        }
        .timer-container {
            font-size: 1rem;
            color: #555;
        }
        .timer-title {
            margin-bottom: 10px;
        }
        #timer {
            font-size: 1.5rem;
            font-weight: bold;
            color: #b8860b;
        }
        canvas {
            position: absolute;
            bottom: 0;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .left-panel {
                padding: 30px 20px 10px 20px;
                flex: none;
                justify-content: flex-start;
            }
            .right-panel {
                flex: 1;
                width: 100%;
            }
            #text-container {
                font-size: 1rem; 
                min-height: 130px;
                margin-bottom: 20px;
            }
            #timer {
                font-size: 1.2rem; 
            }
            canvas {
                max-width: 100vw;
                max-height: 55vh; 
                object-fit: contain;
                bottom: 0;
            }
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <div id="text-container"></div>
        <div class="timer-container">
            <div class="timer-title">Meu amor por você começou há...</div>
            <div id="timer">0 dias 0 horas 0 minutos 0 segundos</div>
        </div>
    </div>

    <div class="right-panel">
        <canvas id="treeCanvas" width="500" height="600"></canvas>
    </div>

    <script>
        // --- 1. EFEITO DE MÁQUINA DE ESCREVER ---
        const message = "Que demora para me responder, tô aqui sofrendo sem você\n\nMas vou deixar essa flor virtual ae para você, meu amor\n\nSe eu pudesse escolher, eu escolheria você infinitas vezes";
        const textContainer = document.getElementById("text-container");
        let charIndex = 0;

        function typeWriter() {
            if (charIndex < message.length) {
                if (message.charAt(charIndex) === '\n') {
                    textContainer.innerHTML += "<br>";
                } else {
                    textContainer.innerHTML += message.charAt(charIndex);
                }
                charIndex++;
                setTimeout(typeWriter, 50); 
            }
        }
        setTimeout(typeWriter, 500); 

        // --- 2. CONTADOR DE TEMPO ---
        // Data atualizada: 09/05/2025 (Mês 4 pois Janeiro é 0)
        const startDate = new Date(2025, 4, 9); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / 1000 / 60) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById("timer").innerText = 
                `${days} dias ${hours} horas ${minutes} minutos ${seconds} segundos`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // --- 3. DESENHO DA ÁRVORE COM FLORES ---
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function drawTrunk() {
            ctx.beginPath();
            ctx.moveTo(250, 600); 
            ctx.quadraticCurveTo(240, 400, 250, 250); 
            ctx.lineWidth = 14;
            ctx.strokeStyle = '#4a2f1d';
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(247, 350);
            ctx.quadraticCurveTo(200, 300, 180, 280);
            ctx.moveTo(248, 400);
            ctx.quadraticCurveTo(300, 320, 320, 300);
            ctx.lineWidth = 5;
            ctx.stroke();
        }

        const flowers = [];
        for (let t = 0; t < Math.PI * 2; t += 0.02) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);

            x = x * 10 + 250;
            y = -y * 10 + 200;

            for (let i = 0; i < 4; i++) {
                flowers.push({
                    x: x + (Math.random() - 0.5) * 45,
                    y: y + (Math.random() - 0.5) * 45,
                    size: Math.random() * 4 + 3
                });
            }
        }

        flowers.sort(() => Math.random() - 0.5);

        let flowerIndex = 0;
        function drawFlowers() {
            if (flowerIndex < flowers.length) {
                for (let i = 0; i < 6; i++) {
                    if (flowerIndex >= flowers.length) break;
                    const f = flowers[flowerIndex];

                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
                    ctx.fillStyle = '#FFD700';
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.size / 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#8B4513';
                    ctx.fill();

                    flowerIndex++;
                }
                requestAnimationFrame(drawFlowers);
            }
        }

        drawTrunk();
        setTimeout(drawFlowers, 1200); 

    </script>
</body>
</html>
